name: Build & Release

# Cut a release by pushing a version tag:
#   git tag v1.2.0 && git push origin v1.2.0
# Or run manually from the Actions tab (builds artifacts without publishing).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Electron apps must be built on the target OS, so fan out across three runners.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build distributables (electron-builder)
        # Signing is automatic when the relevant secrets are configured:
        #   macOS:   CSC_LINK / CSC_KEY_PASSWORD (+ notarize: APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID)
        #   Windows: CSC_LINK / CSC_KEY_PASSWORD
        # Absent them the apps build unsigned. An empty CSC_LINK must be cleared,
        # or electron-builder tries (and fails) to sign macOS with a missing cert.
        shell: bash
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "No signing certificate — building unsigned."
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect user-facing artifacts
        shell: bash
        run: |
          mkdir -p out
          # Ship only the installers (.dmg / .exe / .AppImage). Skip
          # electron-builder's combined multi-arch NSIS installer
          # (joust-neon-edition-win.exe); we ship the per-arch installers instead.
          find dist -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) \
            ! -name 'joust-neon-edition-win.exe' \
            -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: out/
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksums
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt
          ls -lh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          release/*
          --title "JOUST — Neon Edition ${GITHUB_REF_NAME}"
          --generate-notes
